  console:
    image: vesoft/nebula-console:v3.4.0
    entrypoint: ""
    command: 
      - sh
      - -c
      - |
        for i in `seq 1 60`;do
          var=`nebula-console -addr graphd0 -port 9669 -u root -p nebula -e 'ADD HOSTS "storaged0":9779,"storaged1":9779,"storaged2":9779,"storaged3":9779,"storaged4":9779'`;
          if [[ $$? == 0 ]];then
            break;
          fi;
          sleep 1;
          echo "retry to add hosts.";
        done && tail -f /dev/null;
    depends_on:
      - graphd0
      - graphd1
    networks:
      - nebula-net

  studio:
    image: vesoft/nebula-graph-studio:v3
    container_name: nebula-studio
    environment:
      USER: root
      PASSWORD: nebula
      NEBULA_ADDRESS: "graphd0:9669"
      STUDIO_ENDPOINT: "http://0.0.0.0:7001"
    ports:
      - "7001:7001"
    depends_on:
      - graphd0
    networks:
